name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            olab_camera:
              - 'packages/olab_camera/**'
            olab_utils:
              - 'packages/olab_utils/**'
            olab_rf:
              - 'packages/olab_rf/**'
            olab_voice:
              - 'packages/olab_voice/**'
            olab_audio:
              - 'packages/olab_audio/**'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJSON(needs.detect-changes.outputs.packages) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # olab_audio's base dependencies (pyaudio, pulsectl) are intentionally
      # core, not an opt-in extra — the plan's v1 scope treats device I/O as
      # the default install; only the DSP/teaching toolkit (`analysis`) is
      # opt-in. pyaudio needs PortAudio's headers to build on Ubuntu.
      - name: Install system prerequisites for olab_audio
        if: matrix.package == 'olab_audio'
        run: sudo apt-get update && sudo apt-get install -y portaudio19-dev
      - name: Install package (base dependencies only)
        run: |
          python -m pip install --upgrade pip
          pip install "./packages/${{ matrix.package }}"
          pip install pytest
      # Only base-dependency tests run here, deliberately — hardware/model
      # *extras* (ROS, STT/TTS models, etc.) are opt-in per CONTRIBUTING.md's
      # Testing section and must not be installed on every PR. Packages
      # needing extra-specific CI coverage add a separate, explicitly
      # opt-in job rather than expanding this one.
      - name: Run tests
        run: pytest "packages/${{ matrix.package }}/tests" -v
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build "packages/${{ matrix.package }}"
