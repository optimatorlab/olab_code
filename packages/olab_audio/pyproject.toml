[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "olab-audio"
version = "0.1.0"
description = "Audio device I/O (Mic/Speaker/recording, device enumeration, PulseAudio control) plus an optional DSP/analysis/teaching toolkit."
# TODO(open item #5): requires-python not yet decided workspace-wide.
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    # Core I/O only, per plan's v1 scope table.
    "pyaudio",
    "pulsectl",
]

[project.optional-dependencies]
# DSP/analysis/teaching toolkit, per plan's v1 scope table.
analysis = ["librosa", "soundfile", "matplotlib"]
all = ["olab-audio[analysis]"]

[tool.hatch.build.targets.wheel]
packages = ["src/olab_audio"]
