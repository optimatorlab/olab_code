[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "olab-camera"
version = "0.1.0"
description = "Camera capture, local recording, and network streaming (MJPEG/WebSocket/WebRTC) for lab robotics projects."
# TODO(open item #5): requires-python not yet decided workspace-wide;
# ub_rf needs >=3.11, ub_camera's old (unverified) claim was >=3.7. Resolve before release.
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "olab-utils",
    "numpy>=1.21.0",
    "opencv-contrib-python>=4.10.0",
    "pyzbar>=0.1.9",
    # TLS is not optional: every streaming mode (including the MJPEG
    # default) serves over HTTPS/WSS. cryptography auto-generates a local
    # self-signed cert on first use (see olab_camera.tls) instead of
    # shipping a shared private key as package data.
    "cryptography>=42",
]

[project.optional-dependencies]
# Extras carried over from ub_code's existing, already-proven convention.
yolo = ["ultralytics>=8.3.0"]
ros = ["rospy", "cv-bridge", "sensor-msgs"]
websocket = ["websockets>=12.0"]
webrtc = ["aiortc>=1.9.0", "aiohttp>=3.9.0"]
all = ["olab-camera[yolo,ros,websocket,webrtc]"]

[project.scripts]
olab-camera-generate-cert = "olab_camera.tls:generate_cert_main"

[tool.hatch.build.targets.wheel]
packages = ["src/olab_camera"]
