[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "olab-utils"
version = "0.1.0"
description = "Shared utility helpers for lab robotics projects."
# TODO(open item #5): requires-python not yet decided workspace-wide.
requires-python = ">=3.10"
readme = "README.md"
dependencies = [
    "numpy>=1.21.0",
    "opencv-contrib-python>=4.10.0",
]

[project.optional-dependencies]
all = []

[tool.hatch.build.targets.wheel]
packages = ["src/olab_utils"]
